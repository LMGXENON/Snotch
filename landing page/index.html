html,
body {

.grid-overlay {
	position: absolute;
	top: 0;
	left: 0;
	width: 100%;
	min-height: 100vh;
	pointer-events: none;
	z-index: 9999;
	background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 31px, red 31px, red 32px);
	display: none
}

.grid-overlay.active {
	display: block
}

@keyframes scroll-left {
	0% {
		transform: translateX(0)
	}

	100% {
		transform: translateX(calc(-1 * var(--scroll-distance, 50%)))
	}
}

@keyframes scroll-up {
	0% {
		transform: translateY(0)
	}

	100% {
		transform: translateY(calc(-1 * var(--scroll-height, 100%)))
	}
}

@keyframes slide-up-entrance {
	0% {
		transform: translateY(20px);
		opacity: 0
	}

	100% {
		transform: translateY(0);
		opacity: 1
	}
}

@keyframes liquid-glow {
	0% {
		transform: translateX(-15%) translateY(-6%) rotate(0deg) scale(1);
		opacity: 0.65
	}

	50% {
		transform: translateX(10%) translateY(4%) rotate(1deg) scale(1.05);
		opacity: 0.85
	}

	100% {
		transform: translateX(30%) translateY(-4%) rotate(-1deg) scale(1.02);
		opacity: 0.6
	}
}

.glass-cta {
	position: relative;
	display: inline-flex;
	align-items: center;
	justify-content: center;
	gap: 0.3rem;
	width: auto;
	min-height: 60px;
	padding: 0.9rem 1.5rem;
	border-radius: 999px;
	font-family: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;
	font-weight: 500;
	font-size: 20px;
	line-height: 1.05;
	color: #111;
	text-decoration: none;
	background: #fff;
	border: none;
	overflow: hidden;
	transition: transform 0.2s ease-out, filter 0.2s ease-out, box-shadow 0.2s ease-out;
	box-shadow: 0 0 40px rgba(11, 0, 238, 1), 0 0 100px rgba(11, 0, 238, 0.8), 0 0 200px rgba(11, 0, 238, 0.6), 0 0 400px rgba(11, 0, 238, 0.4)
}

.glass-cta::before {
	content: none
}

.glass-cta::after {
	content: none
}

.glass-cta::selection {
	background: transparent
}

.glass-cta span,
.glass-cta svg {
	position: relative;
	z-index: 1
}

.glass-cta .liquid-sheen {
	pointer-events: none;
	position: absolute;
	inset: 4px;
	border-radius: 999px;
	background: radial-gradient(120% 140% at 20% 30%, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0)), radial-gradient(90% 120% at 80% 70%, rgba(120, 148, 255, 0.12), rgba(120, 148, 255, 0));
	mix-blend-mode: screen;
	filter: blur(6px);
	animation: liquid-glow 6s ease-in-out infinite alternate;
	opacity: 0.65
}

.glass-cta svg {
	width: 28px;
	height: 28px;
	color: #000;
	transform: translateY(-2px)
}

.glass-cta:hover {
	transform: translateY(-2px);
	filter: brightness(1.02)
}

.glass-cta:active {
	transform: translateY(0);
	box-shadow: none;
	filter: brightness(0.995)
}

.cta-black {
	background: #000;
	color: #fff;
	border: none;
	box-shadow: 0 0 40px rgba(11, 0, 238, 0.5), 0 0 100px rgba(11, 0, 238, 0.4), 0 0 200px rgba(11, 0, 238, 0.3), 0 0 400px rgba(11, 0, 238, 0.2)
}

.cta-black svg {
	color: #fff
}

.cta-trial {
	border: 1px solid rgba(255, 255, 255, 0.2);
	box-shadow: none
}

.cta-trial svg {
	transform: none
}

.cta-trial-white {
	background: #fff;
	color: #000;
	border: 1px solid #000;
	box-shadow: none
}

.cta-trial-white svg {
	color: #000;
	transform: none
}

@keyframes word-reveal {
	0% {
		opacity: 0;
		transform: translateY(20px)
	}

	100% {
		opacity: 1;
		transform: translateY(0)
	}
}

.h1-word {
	display: inline-block;
	opacity: 0;
	animation: word-reveal 0.3s ease-out forwards
}

@media(max-width:768px) {
	.h1-word {
		opacity: 1;
		animation: none
	}
}

#header-wrapper.is-hidden #notch-prompter {
	transform: translateX(-50%) scale(0.75) translateY(-150px);
	pointer-events: none
}

#notch-prompter::before {
	content: "";
	position: absolute;
	inset: 0;
	background: radial-gradient(120% 90% at 50% -10%, rgba(255, 255, 255, 0.05), transparent 60%);
	pointer-events: none
}

.notch-glow {
	position: absolute;
	width: 426px;
	height: 42px;
	left: 51px;
	top: -5px;
	background: url("assets/notch-glow.png") center/cover no-repeat;
	pointer-events: none;
	opacity: 0.9
}

.notch-text {
	position: absolute;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
	width: 380px;
	height: 100%;
	padding: 12px 0;
	text-align: center;
	color: #ffffff;
	font-family: "Geist Mono", "SFMono-Regular", Menlo, Monaco, monospace;
	font-weight: 500;
	font-size: 1.5rem;
	line-height: 1.5;
	text-shadow: 0px 40px 80px rgba(44, 9, 12, 0.07);
	overflow: hidden;
	z-index: 1
}

.notch-fade-overlay {
	position: absolute;
	left: 50%;
	top: 0;
	transform: translateX(-50%);
	width: 380px;
	height: 50px;
	pointer-events: none;
	z-index: 10;
	background: linear-gradient(180deg, #000 0%, #000 30%, transparent 100%)
}

#notch-lines {
	display: flex;
	flex-direction: column;
	/* ensure each injected line fills the available prompter width */
	align-items: stretch;
	will-change: transform;
	transform: translateY(0);
	position: relative;
	z-index: 1;
	animation: none
}

/* make each line occupy full width and center its text */
#notch-lines>div{
    width:100%;
    box-sizing:border-box;
    padding:0 8px;
    text-align:center;
    white-space:normal;
}

.inline-logo {
	display: inline-block;
	width: 1.2em;
	height: 1.2em;
	vertical-align: middle;
	margin: 0 0.2em;
	transform: rotate(15deg)
}

.video-container {
	position: relative
}

.unmute-icon {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: 120px;
	height: 120px;
	background: rgba(0, 0, 0, 0.7);
	border-radius: 50%;

	justify-content: center;

}

.video-container:hover .unmute-icon {

}

.unmute-icon svg {
	width: 60px;
	height: 60px;
	color: white
}

@media (max-width:768px) {
	.unmute-icon {
		display: none !important
	}
}




:root {
	--section-gap: 128px;
	--body-content-top: 2rem;
	--top-gradient-end-raw: calc(100vw * 1322 / 3004 - 50px);
	--top-gradient-end: calc(var(--top-gradient-end-raw) - var(--body-content-top))
}

.top-stage {
	background: linear-gradient(to bottom, transparent 0, transparent calc(var(--top-gradient-end) - 1px - 24px), #000 calc(var(--top-gradient-end) - 1px - 16px), #000 calc(100% - 600px), rgba(0, 0, 0, 0.85) calc(100% - 450px), rgba(0, 0, 0, 0.6) calc(100% - 300px), rgba(0, 0, 0, 0.3) calc(100% - 150px), transparent 100%)
}


@media (min-width:1280px) {
	:root {
		--top-gradient-end-raw: calc(100vw * 1322 / 3004 - 150px)
	}

	body::before {
		top: -150px
	}
}

@media (min-width:1920px) {
	:root {
		--top-gradient-end-raw: calc(100vw * 1322 / 3004 - 250px)
	}

	body::before {
		top: -250px
	}
}

@media (min-width:2500px) {
	:root {
		--top-gradient-end-raw: calc(100vw * 1322 / 3004 - 400px)
	}

	body::before {
		top: -400px
	}
}


@media (max-width:768px) {
	:root {
		--top-gradient-end-raw: calc(200vw * 1322 / 3004 - 75px)
	}

	.top-bar {
		display: none !important
	}

	body::before {
		top: -75px !important;
		width: 200vw !important;
		left: -50vw !important;
		height: calc(200vw * 1322 / 3004) !important
	}

	#notch-prompter .notch-text {
		left: 0;
		transform: translateY(-50%);
		width: 100%;
		padding-left: 4rem;
		padding-right: 4rem;
		box-sizing: border-box;
		font-size: 1.25rem
	}

	#notch-prompter .notch-fade-overlay {
		left: 0;
		transform: none;
		width: 100%
	}

	.top-stage {
		background: linear-gradient(to bottom, transparent 0, transparent calc(var(--top-gradient-end) - 1px - 20px), #000 calc(var(--top-gradient-end) - 1px - 20px), #000 calc(100% - 600px), rgba(0, 0, 0, 0.85) calc(100% - 450px), rgba(0, 0, 0, 0.6) calc(100% - 300px), rgba(0, 0, 0, 0.3) calc(100% - 150px), transparent 100%) !important
	}

	.light-stage {
		position: relative
	}

	.light-stage::after {
		content: '';
		position: absolute;
		bottom: 0;
		left: -100vw;
		right: -100vw;
		height: 240px;
		background: #000;
		z-index: 2
	}

	body.ready::after {
		bottom: 230px !important;
		width: 200vw !important;
		left: -50vw !important;
		z-index: 1 !important
	}

	footer {

		padding-top: 1.5rem !important;
		padding-bottom: 2rem !important
	}

	body {
		padding-bottom: 2rem !important
	}
