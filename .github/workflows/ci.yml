name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Lint and Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  macos-build:
    name: macOS Build
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: >-
          xcodebuild
          -project Snotch.xcodeproj
          -scheme Snotch
          -configuration Debug
          -destination "platform=macOS"
          CODE_SIGNING_ALLOWED=NO
          build
